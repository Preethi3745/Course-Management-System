<!DOCTYPE html>
<html>
<head>
    <title>Student Dashboard</title>
</head>
<body>

<h1>Student Dashboard</h1>

<h3>Profile</h3>

<p>Name: <span id="studentName"></span></p>
<p>Department: <span id="dep"></span></p>

<h3>Enrolled Courses</h3>

<ul>
    <li>Python Programming - 80% Completed</li>
    <li>Full Stack Development - 60% Completed</li>
    <li>Artificial Intelligence - 40% Completed</li>
</ul>

<h3>Learning Progress</h3>

<progress value="60" max="100"></progress>

<p>Overall Progress: 60%</p>

<br><br>


<button onclick="logout()">Logout</button>

<script>
document.getElementById("studentName").innerHTML = localStorage.getItem("studentName");
document.getElementById("dep").innerHTML = localStorage.getItem("dep");
function browseCourses() {
    window.location.href = "courses.html";
}

function continueLearning() {
    window.location.href = "learning.html";
}

function logout() {
    localStorage.removeItem("studentName");
    localStorage.removeItem("dep");    
    window.location.href = "index.html";
}
</script>

</body>
</html>
